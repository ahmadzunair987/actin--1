name: My First Yml flow.

on: push

jobs:
    first_job:
        runs-on: ubuntu-latest
        steps:
        - name: Checkout repo  
          uses: actions/checkout@v7
        
        - name: list the files
          run: |
            echo "run multiple command in single runner"
            ls -lha
            cat README.md

        - name: Run bash file
          run: |
           chmod +x script.sh
           ./script.sh