name: My First Yml flow.

on: push

jobs:
    first_job:
        runs-on: ubuntu-latest
        steps:
        - name: Checkout repo  
          uses: actions/checkout@v7
        
        - name: list the files
          run: |
            echo "run multiple command in single runner"
            ls -lha
            cat README.md

        - name: Run third party library in action
          run: |
            sudo apt-get update && sudo apt-get install -y cowsay
            cowsay -f dragon "Run for cover, I am a Dorgan....RAWR" >>dragon.txt
        - name: View dragon file
          run: cat dragon.txt